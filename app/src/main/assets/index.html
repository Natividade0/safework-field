<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SafeField</title>
  <link rel="stylesheet" href="app.css?v=20251206-ptfix2">
</head>
<body>
  <header>
    <h1>SafeField</h1>
    <div class="small">Segurança do Trabalho em campo · Industrial Premium Dark</div>
  </header>

  <section id="app" class="screen"></section>

  <nav class="bottom">
    <button class="active" data-nav="home" onclick="home()"><span class="navico">M</span><span>Menu</span></button>
    <button data-nav="apr" onclick="openModule('APR')"><span class="navico">A</span><span>APR</span></button>
    <button data-nav="pt" onclick="openPT()"><span class="navico">P</span><span>PT</span></button>
    <button data-nav="dashboard" onclick="dashboard()"><span class="navico">D</span><span>Painel</span></button>
  </nav>

  <script src="app.js?v=20251206-ptfix2"></script>
  <script src="pt.js?v=20251206-ptfix2"></script>
  <script>
    const legacyOpenModule = window.openModule;
    window.openModule = function(moduleName) {
      if (moduleName === 'PT') return window.openPT();
      return legacyOpenModule(moduleName);
    };
  </script>
</body>
</html>
