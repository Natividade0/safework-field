<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SafeField</title><style>:root{--bg:#0A0A0F;--surface:#13141A;--surface2:#171923;--border:rgba(255,255,255,.06);--text:#F5F7FA;--muted:#9CA3AF;--accent:#F59E0B;--soft:rgba(245,158,11,.12);--shadow:0 4px 24px rgba(0,0,0,.45)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif}header{padding:22px 18px 16px;border-bottom:1px solid var(--border);background:rgba(10,10,15,.96);position:sticky;top:0;z-index:9}h1{margin:0;color:var(--accent);font-size:34px;font-weight:900;letter-spacing:-.05em}.small,.muted{color:var(--muted);font-size:12px}.screen{padding:16px 16px 104px}.hero,.module,.kpi,.item,.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow)}.hero{padding:16px;margin-bottom:14px}.hero b{display:block;font-size:17px;margin-bottom:4px}.hero span{color:var(--muted);font-size:13px}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}.kpi{padding:14px}.kpi b{font-family:monospace;font-size:30px;color:var(--accent)}.kpi span{display:block;margin-top:6px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em}.title{font-size:18px;font-weight:900;margin:4px 0 12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.module{padding:14px;min-height:112px;display:flex;flex-direction:column;justify-content:space-between}.top{display:flex;gap:12px;align-items:center}.ico{width:44px;height:44px;border-radius:999px;background:var(--soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:900}.name{font-size:16px;font-weight:900}.badge{display:inline-flex;width:max-content;padding:6px 10px;border-radius:999px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.18);color:var(--accent);font-size:11px;font-weight:800}button{min-height:50px;border:0;border-radius:12px;font-weight:900;background:var(--surface2);color:var(--text)}.bottom{position:fixed;left:14px;right:14px;bottom:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px;background:rgba(19,20,26,.78);border:1px solid rgba(255,255,255,.07);border-radius:22px;box-shadow:0 10px 34px rgba(0,0,0,.55);backdrop-filter:blur(18px)}.bottom button{min-height:58px;background:transparent;color:var(--muted);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:11px;font-weight:800;position:relative}.bottom button:before{content:"";position:absolute;top:7px;left:50%;width:0;height:3px;border-radius:999px;background:var(--accent);transform:translateX(-50%)}.bottom button.active{color:var(--accent);background:rgba(245,158,11,.055)}.bottom button.active:before{width:18px;box-shadow:0 0 14px rgba(245,158,11,.5)}.navico{width:22px;height:22px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:950;color:inherit;background:rgba(255,255,255,.035)}.bottom button.active .navico{background:rgba(245,158,11,.12)}label{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:800;margin:10px 0 6px}input,select,textarea{width:100%;padding:14px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:12px;outline:0}textarea{min-height:100px}.primary{width:100%;background:var(--accent);color:#111;margin-top:12px}.card{padding:14px;margin:12px 0}canvas{width:100%;height:140px;background:#0E1015;border:1px dashed rgba(255,255,255,.12);border-radius:12px;touch-action:none}.item{padding:12px;margin:10px 0}.item b{color:var(--accent);font-family:monospace}@media(max-width:380px){.grid{grid-template-columns:1fr}}</style></head><body><header><h1>SafeField</h1><div class="small">Segurança do Trabalho em campo · Industrial Premium Dark</div></header><section id="app" class="screen"></section><nav class="bottom"><button class="active" onclick="home()"><span class="navico">M</span><span>Menu</span></button><button onclick="form('APR')"><span class="navico">A</span><span>APR</span></button><button onclick="form('PT')"><span class="navico">P</span><span>PT</span></button><button onclick="dashboard()"><span class="navico">D</span><span>Painel</span></button></nav><script>const app=document.getElementById('app');const types=['Altura','Espaço confinado','Elétrico','Escavação','Içamento','Obra civil','Trabalho a quente','LOTO'];function data(){return JSON.parse(localStorage.getItem('sf_records')||'[]')}function saveData(d){localStorage.setItem('sf_records',JSON.stringify(d))}function id(t){return t+'-'+new Date().toISOString().slice(0,10).replaceAll('-','')+'-'+Math.random().toString(36).slice(2,6).toUpperCase()}function count(m){return data().filter(x=>x.mod===m).length}function card(i,t,s,b){return '<div class="module" onclick="'+(t==='Dashboard'?'dashboard()':'form(\''+t+'\')')+'"><div class="top"><div class="ico">'+i+'</div><div><div class="name">'+t+'</div><div class="muted">'+s+'</div></div></div><div class="badge">'+b+'</div></div>'}function home(){app.innerHTML='<div class="hero"><b>Operações críticas em até 3 toques</b><span>APR, PT, DDS, inspeções e ocorrências com visual otimizado para uso em campo.</span></div><div class="kpis"><div class="kpi"><b>'+count('APR')+'</b><span>APR emitidas</span></div><div class="kpi"><b>'+count('PT')+'</b><span>PTs abertas</span></div></div><div class="title">Módulos</div><div class="grid">'+card('A','APR','Análise preliminar','Acesso rápido')+card('P','PT','Permissão de trabalho','Controle ativo')+card('D','DDS','Diálogo diário','Presença')+card('E','EPI','Entrega e validade','Estoque')+card('I','Inspeção','Checklist e NC','Campo')+card('O','Ocorrência','Incidente e quase-acidente','Registro')+card('C','Colaboradores','ASO e treinamentos','Equipe')+card('K','Dashboard','Indicadores da obra','Gestão')+'</div>'}function form(mod){app.innerHTML='<div class="title">'+mod+'</div><label>Tipo de atividade</label><select id="tipo">'+types.map(t=>'<option>'+t+'</option>').join('')+'</select><label>Descrição / atividade</label><input id="desc" placeholder="Ex.: montagem de andaime"><label>Local / frente</label><input id="local" placeholder="Ex.: pipe rack setor B"><label>Responsável</label><input id="resp" placeholder="Nome do TST ou encarregado"><label>Equipe / colaborador</label><input id="colab"><label>Observações</label><textarea id="obs"></textarea><div class="card"><b>Assinatura digital</b><canvas id="sig" width="600" height="180"></canvas><button onclick="clearSig()">Limpar assinatura</button></div><button class="primary" onclick="saveRecord(\''+mod+'\')">Salvar registro offline</button>';setupCanvas()}let cvs,ctx,drawing=false;function setupCanvas(){cvs=document.getElementById('sig');ctx=cvs.getContext('2d');ctx.strokeStyle='#F59E0B';ctx.lineWidth=4;ctx.lineCap='round';cvs.onpointerdown=e=>{drawing=true;ctx.beginPath();ctx.moveTo(e.offsetX,e.offsetY)};cvs.onpointermove=e=>{if(drawing){ctx.lineTo(e.offsetX,e.offsetY);ctx.stroke()}};cvs.onpointerup=()=>drawing=false;cvs.onpointerleave=()=>drawing=false}function clearSig(){if(ctx)ctx.clearRect(0,0,600,180)}function saveRecord(mod){let r={id:id(mod),mod,createdAt:new Date().toISOString(),tipo:tipo.value,desc:desc.value,local:local.value,resp:resp.value,colab:colab.value,obs:obs.value};let d=data();d.unshift(r);saveData(d);dashboard()}function dashboard(){let d=data();app.innerHTML='<div class="title">Dashboard</div><div class="kpis"><div class="kpi"><b>'+d.length+'</b><span>Total registros</span></div><div class="kpi"><b>'+d.filter(x=>x.mod==='Ocorrência').length+'</b><span>Ocorrências</span></div></div>'+d.map(r=>'<div class="item"><b>'+r.id+'</b><div class="small">'+new Date(r.createdAt).toLocaleString('pt-BR')+' · '+r.mod+'</div><p>'+(r.desc||'Sem descrição')+' · '+(r.local||'Sem local')+'</p></div>').join('')}home();</script></body></html>
